<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar - Vehículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center mb-4 text-white">RentCar<span style="color: var(--primary-scarlet);">.</span></h4>
            <a href="index.html"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
            <a href="catalogos.html"><i class="fa-solid fa-list me-2"></i> Catálogos</a>
            <a href="vehiculos.html" class="active"><i class="fa-solid fa-car me-2"></i> Vehículos</a>
            <a href="clientes.html"><i class="fa-solid fa-users me-2"></i> Clientes</a>
            <a href="empleados.html"><i class="fa-solid fa-user-tie me-2"></i> Empleados</a>
            <a href="rentas.html"><i class="fa-solid fa-key me-2"></i> Rentas</a>
            <a href="reportes.html"><i class="fa-solid fa-file-pdf me-2"></i> Reportes</a>
        </div>

        <div class="col-md-10 p-4">
            <h2 class="mb-4">Gestión de Vehículos</h2>

            <div class="row">
                
                <div class="col-md-4">
                    <div class="card p-4">
                        <h5 class="mb-3">Registrar Vehículo</h5>
                        <form id="form-vehiculo">
                            <div class="mb-3">
                                <label class="form-label">Descripción</label>
                                <input type="text" class="form-control" id="desc-vehiculo" required placeholder="Ej. Toyota Corolla 2024">
                            </div>
                            
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">No. Placa</label>
                                    <input type="text" class="form-control" id="placa-vehiculo" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">No. Chasis</label>
                                    <input type="text" class="form-control" id="chasis-vehiculo" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">No. Motor</label>
                                <input type="text" class="form-control" id="motor-vehiculo" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Marca</label>
                                <select class="form-select" id="marca-vehiculo" required>
                                    <option value="">Seleccione una marca...</option>
                                    </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Modelo</label>
                                <select class="form-select" id="modelo-vehiculo" required>
                                    <option value="">Seleccione un modelo...</option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-6 mb-4">
                                    <label class="form-label">Tipo</label>
                                    <select class="form-select" id="tipo-vehiculo" required>
                                        <option value="">Seleccione...</option>
                                    </select>
                                </div>
                                <div class="col-6 mb-4">
                                    <label class="form-label">Combustible</label>
                                    <select class="form-select" id="combustible-vehiculo" required>
                                        <option value="">Seleccione...</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-save me-2"></i>Guardar Vehículo</button>
                        </form>
                    </div>
                </div>
                
                <div class="col-md-8">
                    <div class="card p-4">
                        <h5 class="mb-3">Flota de Vehículos</h5>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Descripción</th>
                                        <th>Placa</th>
                                        <th>Chasis</th>
                                        <th>Motor</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                            </thead>
                                <tbody id="tabla-vehiculos">
                                    <tr><td colspan="4" class="text-center text-muted">Cargando flota...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
            </div> 
        </div> 
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
</body>
</html>

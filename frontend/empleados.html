<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar - Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center mb-4 text-white">RentCar<span style="color: var(--primary-scarlet);">.</span></h4>
            <a href="index.html"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
            <a href="catalogos.html"><i class="fa-solid fa-list me-2"></i> Catálogos</a>
            <a href="vehiculos.html"><i class="fa-solid fa-car me-2"></i> Vehículos</a>
            <a href="clientes.html"><i class="fa-solid fa-users me-2"></i> Clientes</a>
            <a href="empleados.html" class="active"><i class="fa-solid fa-user-tie me-2"></i> Empleados</a>
            <a href="rentas.html"><i class="fa-solid fa-key me-2"></i> Rentas</a>
            <a href="reportes.html"><i class="fa-solid fa-file-pdf me-2"></i> Reportes</a>
        </div>

        <div class="col-md-10 p-4">
            <h2 class="mb-4">Gestión de Empleados</h2>

            <div class="row">
                <div class="col-md-4">
                    <div class="card p-4">
                        <h5 class="mb-3">Registrar Empleado</h5>
                        <form id="form-empleado">
    <div class="mb-3">
        <label class="form-label">Nombre Completo</label>
        <input type="text" class="form-control" id="emp-nombre" required placeholder="Ej. Ana Domínguez">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Cédula</label>
        <input type="text" class="form-control" id="emp-cedula" required placeholder="Sin guiones">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Tanda Laboral</label>
        <select class="form-select" id="emp-tanda" required>
            <option value="">Seleccione...</option>
            <option value="Matutina">Matutina</option>
            <option value="Vespertina">Vespertina</option>
            <option value="Nocturna">Nocturna</option>
        </select>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Porcentaje Comisión (%)</label>
        <input type="number" step="0.01" class="form-control" id="emp-comision" required placeholder="Ej. 5.00">
    </div>
    
    <div class="mb-4">
        <label class="form-label">Fecha Ingreso</label>
        <input type="date" class="form-control" id="emp-fecha" required>
    </div>
    
        <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-save"></i> Guardar Empleado</button>
    </form>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card p-4">
                        <h5 class="mb-3">Empleados Registrados</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cédula</th>
        <th>Tanda Labor</th>
        <th>Comisión (%)</th>
        <th>Fecha Ingreso</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
</thead>
                                <tbody id="tabla-empleados">
                                    <tr><td colspan="6" class="text-center text-muted">Cargando base de datos de empleados...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div> </div> </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
</body>
</html>

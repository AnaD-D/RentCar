<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar - Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center mb-4 text-white">RentCar<span style="color: var(--primary-scarlet);">.</span></h4>
            <a href="index.html"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
            <a href="catalogos.html"><i class="fa-solid fa-list me-2"></i> Catálogos</a>
            <a href="vehiculos.html"><i class="fa-solid fa-car me-2"></i> Vehículos</a>
            <a href="clientes.html" class="active"><i class="fa-solid fa-users me-2"></i> Clientes</a>
            <a href="rentas.html"><i class="fa-solid fa-key me-2"></i> Rentas</a>
            <a href="reportes.html"><i class="fa-solid fa-file-pdf me-2"></i> Reportes</a>
        </div>

        <div class="col-md-10 p-4">
            <h2 class="mb-4">Gestión de Clientes</h2>

            <div class="row">
                <div class="col-md-4">
                    <div class="card p-4">
                        <h5 class="mb-3">Registrar Cliente</h5>
                        <form id="form-cliente">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" id="nombre-cliente" required placeholder="Ej. Juan Pérez">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Cédula</label>
                                <input type="text" class="form-control" id="cedula-cliente" required placeholder="001-0000000-0">
                                <div class="form-text">Se validará mediante el algoritmo oficial de la JCE.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">No. Tarjeta de Crédito</label>
                                <input type="text" class="form-control" id="tarjeta-cliente" required placeholder="4111 XXXXXXXX 1111">
                            </div>

                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Tipo Persona</label>
                                    <select class="form-select" id="tipo-persona-cliente" required>
                                        <option value="Física">Física</option>
                                        <option value="Jurídica">Jurídica</option>
                                    </select>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">Límite Crédito</label>
                                    <input type="number" class="form-control" id="limite-cliente" required min="0" placeholder="RD$">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-2">
                                <i class="fa-solid fa-user-plus me-2"></i>Guardar Cliente
                            </button>
                        </form>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card p-4">
                        <h5 class="mb-3">Clientes Registrados</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Cédula</th>
                                        <th>Tipo</th>
                                        <th>Límite (DOP)</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-clientes">
                                    <tr><td colspan="6" class="text-center text-muted">Cargando base de datos de clientes...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div> </div> </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
</body>
</html>

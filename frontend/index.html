<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center mb-4 text-white">RentCar<span style="color: var(--primary-scarlet);">.</span></h4>
            <a href="index.html" class="active"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
            <a href="catalogos.html"><i class="fa-solid fa-list me-2"></i> Catálogos</a>
            <a href="vehiculos.html"><i class="fa-solid fa-car me-2"></i> Vehículos</a>
            <a href="clientes.html"><i class="fa-solid fa-users me-2"></i> Clientes</a>
            <a href="empleados.html"><i class="fa-solid fa-user-tie me-2"></i> Empleados</a>
            <a href="rentas.html"><i class="fa-solid fa-key me-2"></i> Rentas</a>
            <a href="reportes.html"><i class="fa-solid fa-file-pdf me-2"></i> Reportes</a>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Panel General</h2>
                <button class="btn btn-primary" onclick="window.location.href='rentas.html'"><i class="fa-solid fa-plus me-2"></i> Nueva Renta</button>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card p-3">
                        <h6 class="text-muted">Vehículos Disponibles</h6>
                        <h3 id="kpi-disponibles">--</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3">
                        <h6 class="text-muted">Rentas Activas</h6>
                        <h3 id="kpi-rentas">--</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3">
                        <h6 class="text-muted">Ingresos del Mes (DOP)</h6>
                        <h3 id="kpi-ingresos">$--</h3>
                    </div>
                </div>
            </div>

            <div class="card p-4">
                <h5 class="mb-3">Últimas Transacciones</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mt-3">
                      <thead class="table-light">
                        <tr>
                            <th>No. Renta</th>
                            <th>Cliente</th>
                            <th>Vehículo</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                </thead>
        <tbody id="tabla-ultimas-rentas">
            <tr><td colspan="5" class="text-center text-muted">Cargando transacciones...</td></tr>
        </tbody>
    </table>
</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
